version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: freightiq_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: freightiq_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: freightiq_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data: